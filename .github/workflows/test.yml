name: Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20, 22]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Make mock aptible executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x test/mocks/aptible

      - name: Run unit tests
        run: npm test
        env:
          APTUNNEL_CONFIG_HOME: ${{ runner.temp }}/aptunnel-test/config
          APTUNNEL_TEMP_DIR: ${{ runner.temp }}/aptunnel-test/tmp

      - name: Run integration tests
        run: npm run test:integration
        env:
          APTUNNEL_CONFIG_HOME: ${{ runner.temp }}/aptunnel-test/config
          APTUNNEL_TEMP_DIR: ${{ runner.temp }}/aptunnel-test/tmp

  install-test:
    name: Global install (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install globally from local
        run: npm install -g .

      - name: Verify CLI is accessible
        run: aptunnel --version

      - name: Verify help works
        run: aptunnel --help

      - name: Uninstall
        run: npm uninstall -g aptunnel

  publish:
    name: Publish to npm
    needs: [test, install-test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
